# Configuração de deploy no Fly.io
# Região GRU = São Paulo (Brasil) → ping baixo para jogadores brasileiros

app = "superduelo"
primary_region = "gru"   # São Paulo

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  # IMPORTANTE: o jogo guarda o estado das partidas na MEMÓRIA do servidor.
  # Por isso DEVE rodar em UMA ÚNICA máquina (não escalar horizontalmente),
  # senão dois jogadores podem cair em servidores diferentes e não se encontrar.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
