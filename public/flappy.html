<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bet - Betx1</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

  #lobby, #game-screen, #resultado-screen { width: 100%; max-width: 500px; padding: 20px; }

  .logo { text-align: center; margin-bottom: 24px; }
  .logo h1 { font-size: 2rem; font-weight: 900; background: linear-gradient(135deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .logo p { color: #888; font-size: 0.9rem; margin-top: 4px; }

  .card { background: #13131a; border: 1px solid #2a2a3a; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
  .card h3 { color: #a855f7; font-size: 1rem; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }

  .saldo-box { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 1px solid #a855f7; border-radius: 12px; padding: 16px; text-align: center; margin-bottom: 20px; }
  .saldo-box .label { color: #888; font-size: 0.8rem; }
  .saldo-box .value { color: #a855f7; font-size: 1.8rem; font-weight: 700; }

  .grid-salas { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .sala-btn { background: #1a1a2e; border: 2px solid #2a2a3a; border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.2s; text-align: center; }
  .sala-btn:hover, .sala-btn.ativo { border-color: #a855f7; background: #1f1f35; }
  .sala-btn .jogadores { font-size: 1.5rem; font-weight: 700; color: #fff; }
  .sala-btn .info { font-size: 0.75rem; color: #888; margin-top: 4px; }
  .sala-btn .premio { font-size: 0.7rem; color: #a855f7; margin-top: 6px; }

  input[type=number] { width: 100%; background: #1a1a2e; border: 1px solid #2a2a3a; border-radius: 10px; padding: 12px 16px; color: #fff; font-size: 1rem; outline: none; }
  input[type=number]:focus { border-color: #a855f7; }

  .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg, #a855f7, #ec4899); color: #fff; }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-secondary { background: #2a2a3a; color: #fff; margin-top: 10px; }

  .aguardando { text-align: center; padding: 30px; }
  .aguardando .spinner { width: 50px; height: 50px; border: 3px solid #2a2a3a; border-top-color: #a855f7; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .aguardando h3 { color: #a855f7; margin-bottom: 8px; }
  .aguardando p { color: #888; font-size: 0.9rem; }

  .jogadores-lista { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; justify-content: center; }
  .jogador-chip { background: #1f1f35; border: 1px solid #a855f7; border-radius: 20px; padding: 6px 14px; font-size: 0.85rem; color: #a855f7; }

  /* GAME */
  #game-screen { display: none; flex-direction: column; align-items: center; padding: 10px; }
  #placar { display: flex; justify-content: space-around; width: 100%; max-width: 500px; margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
  .placar-item { background: #13131a; border: 1px solid #2a2a3a; border-radius: 10px; padding: 8px 14px; text-align: center; min-width: 80px; }
  .placar-item .pnome { font-size: 0.7rem; color: #888; }
  .placar-item .ppontos { font-size: 1.2rem; font-weight: 700; color: #a855f7; }
  .placar-item.morto .ppontos { color: #ef4444; text-decoration: line-through; }
  .placar-item.eu { border-color: #a855f7; background: #1a1a2e; }

  canvas { border-radius: 12px; border: 2px solid #2a2a3a; display: block; max-width: 100%; }
  #countdown { position: absolute; font-size: 5rem; font-weight: 900; color: #fff; text-shadow: 0 0 30px #a855f7; pointer-events: none; }

  .game-wrapper { position: relative; display: flex; align-items: center; justify-content: center; }

  #tap-hint { color: #888; font-size: 0.85rem; margin-top: 10px; text-align: center; }

  /* RESULTADO */
  #resultado-screen { display: none; text-align: center; }
  .resultado-titulo { font-size: 2rem; font-weight: 900; margin-bottom: 8px; }
  .resultado-titulo.ganhou { background: linear-gradient(135deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .resultado-titulo.perdeu { color: #ef4444; }
  .resultado-valor { font-size: 1.3rem; color: #888; margin-bottom: 24px; }
  .resultado-valor span { color: #a855f7; font-weight: 700; }
  .ranking-lista { text-align: left; margin-bottom: 24px; }
  .ranking-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #13131a; border-radius: 10px; margin-bottom: 8px; border: 1px solid #2a2a3a; }
  .ranking-pos { font-size: 1.3rem; width: 30px; }
  .ranking-nome { flex: 1; font-weight: 600; }
  .ranking-canos { color: #888; font-size: 0.85rem; }
  .ranking-premio { color: #a855f7; font-weight: 700; }

  .msg { padding: 10px 16px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 12px; }
  .msg-erro { background: #2a1515; border: 1px solid #ef4444; color: #ef4444; }
  .msg-ok { background: #0f2a1a; border: 1px solid #22c55e; color: #22c55e; }

  @media (max-width: 480px) { canvas { width: 340px !important; height: 480px !important; } }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="logo">
    <h1>🐦 Flappy Bet</h1>
    <p>Jogue e ganhe de verdade</p>
  </div>

  <div class="saldo-box">
    <div class="label">Seu saldo</div>
    <div class="value" id="saldo-display">R$ 0,00</div>
  </div>

  <div id="msg-area"></div>

  <div class="card">
    <h3>Escolha a sala</h3>
    <div class="grid-salas">
      <div class="sala-btn ativo" data-sala="2" onclick="selecionarSala(2)">
        <div class="jogadores">👥 2</div>
        <div class="info">2 jogadores</div>
        <div class="premio">1º → +100%</div>
      </div>
      <div class="sala-btn" data-sala="3" onclick="selecionarSala(3)">
        <div class="jogadores">👥 3</div>
        <div class="info">3 jogadores</div>
        <div class="premio">1º → +100%</div>
      </div>
      <div class="sala-btn" data-sala="4" onclick="selecionarSala(4)">
        <div class="jogadores">👥 4</div>
        <div class="info">4 jogadores</div>
        <div class="premio">1º+100% / 2º+50%</div>
      </div>
      <div class="sala-btn" data-sala="5" onclick="selecionarSala(5)">
        <div class="jogadores">👥 5</div>
        <div class="info">5 jogadores</div>
        <div class="premio">1º+100% / 2º+50% / 3º=valor</div>
      </div>
    </div>

    <label style="color:#888;font-size:0.85rem;display:block;margin-bottom:8px;">Valor da aposta (mín. R$1)</label>
    <input type="number" id="valor-aposta" min="1" step="1" value="5" placeholder="Ex: 10">
  </div>

  <button class="btn btn-primary" id="btn-entrar" onclick="entrarFila()">Entrar na Fila 🚀</button>

  <div id="aguardando-box" style="display:none">
    <div class="card aguardando">
      <div class="spinner"></div>
      <h3>Aguardando jogadores...</h3>
      <p id="aguardando-texto">0 / 2 na sala</p>
      <div class="jogadores-lista" id="jogadores-lista"></div>
    </div>
    <button class="btn btn-secondary" onclick="sairFila()">Cancelar</button>
  </div>
</div>

<!-- JOGO -->
<div id="game-screen">
  <div id="placar"></div>
  <div class="game-wrapper">
    <canvas id="canvas" width="360" height="500"></canvas>
    <div id="countdown" style="display:none"></div>
  </div>
  <div id="tap-hint">Toque ou pressione ESPAÇO para voar</div>
</div>

<!-- RESULTADO -->
<div id="resultado-screen">
  <div class="logo"><h1>🐦 Flappy Bet</h1></div>
  <div id="resultado-titulo" class="resultado-titulo"></div>
  <div id="resultado-valor" class="resultado-valor"></div>
  <div class="ranking-lista" id="ranking-lista"></div>
  <button class="btn btn-primary" onclick="voltarLobby()">Jogar Novamente</button>
</div>

<script>
const token = localStorage.getItem('token');
if (!token) { window.location.href = '/'; }

const socket = io();
let salaAtual = 2;
let myRole = null;
let myNome = '';
let myId = null;
let valorAposta = 5;
let gameAtivo = false;
let morto = false;
let canos = [];
let passaro = { x: 80, y: 250, vy: 0, largura: 34, altura: 28 };
let pontos = 0;
let frame = 0;
let animId = null;
let jogadoresInfo = {};
let totalJogadores = 0;
let canvas, ctx;
let lastTimestamp = 0;
const FPS = 60;

// Física
const GRAVITY = 0.45;
const FLAP = -8;
const CANO_VEL = 2.5;
const CANO_GAP = 160;
const CANO_LARGURA = 60;

function selecionarSala(n) {
  salaAtual = n;
  document.querySelectorAll('.sala-btn').forEach(b => b.classList.remove('ativo'));
  document.querySelector(`[data-sala="${n}"]`).classList.add('ativo');
}

async function carregarSaldo() {
  try {
    const r = await fetch('/api/perfil', { headers: { Authorization: 'Bearer ' + token } });
    const d = await r.json();
    myNome = d.nome;
    myId = d.id;
    document.getElementById('saldo-display').textContent = 'R$ ' + (d.saldo || 0).toFixed(2).replace('.', ',');
  } catch(e) {}
}

function mostrarMsg(texto, tipo) {
  const el = document.getElementById('msg-area');
  el.innerHTML = `<div class="msg msg-${tipo}">${texto}</div>`;
  setTimeout(() => el.innerHTML = '', 4000);
}

function entrarFila() {
  valorAposta = parseFloat(document.getElementById('valor-aposta').value);
  if (!valorAposta || valorAposta < 1) return mostrarMsg('Valor mínimo é R$1', 'erro');

  document.getElementById('btn-entrar').disabled = true;
  document.getElementById('aguardando-box').style.display = 'block';
  document.getElementById('btn-entrar').style.display = 'none';

  socket.emit('flappy_join', { token, sala: salaAtual, valor: valorAposta });
}

function sairFila() {
  socket.emit('flappy_leave');
  document.getElementById('aguardando-box').style.display = 'none';
  document.getElementById('btn-entrar').style.display = 'block';
  document.getElementById('btn-entrar').disabled = false;
}

socket.on('flappy_sala_update', ({ jogadores, total }) => {
  document.getElementById('aguardando-texto').textContent = `${jogadores.length} / ${total} na sala`;
  const lista = document.getElementById('jogadores-lista');
  lista.innerHTML = jogadores.map(j => `<div class="jogador-chip">${j.nome}</div>`).join('');
});

socket.on('flappy_start', ({ jogadores, valor, countdown }) => {
  totalJogadores = jogadores.length;
  valorAposta = valor;
  jogadoresInfo = {};
  jogadores.forEach(j => { jogadoresInfo[j.id] = { nome: j.nome, pontos: 0, morto: false, eu: j.id === myId }; });

  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';

  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');

  iniciarContagem(countdown);
});

function iniciarContagem(seg) {
  const el = document.getElementById('countdown');
  el.style.display = 'block';
  el.textContent = seg;
  const iv = setInterval(() => {
    seg--;
    if (seg <= 0) {
      clearInterval(iv);
      el.style.display = 'none';
      iniciarJogo();
    } else {
      el.textContent = seg;
    }
  }, 1000);
}

function iniciarJogo() {
  gameAtivo = true;
  morto = false;
  canos = [];
  passaro = { x: 80, y: 250, vy: 0 };
  pontos = 0;
  frame = 0;

  document.addEventListener('keydown', pular);
  canvas.addEventListener('click', pular);
  canvas.addEventListener('touchstart', pular);

  requestAnimationFrame(loop);
}

function pular(e) {
  if (e.type === 'keydown' && e.code !== 'Space') return;
  e.preventDefault();
  if (!gameAtivo || morto) return;
  passaro.vy = FLAP;
  socket.emit('flappy_pulo');
}

function loop(timestamp) {
  if (!gameAtivo) return;
  animId = requestAnimationFrame(loop);

  // Física local
  passaro.vy += GRAVITY;
  passaro.y += passaro.vy;

  frame++;

  // Spawnar canos
  if (frame % 90 === 0) {
    const topo = 60 + Math.random() * (canvas.height - CANO_GAP - 120);
    canos.push({ x: canvas.width, topo, passou: false });
  }

  // Mover canos
  for (let c of canos) {
    c.x -= CANO_VEL;
    if (!c.passou && c.x + CANO_LARGURA < passaro.x) {
      c.passou = true;
      pontos++;
      socket.emit('flappy_ponto', { pontos });
      atualizarPlacar();
    }
  }
  canos = canos.filter(c => c.x + CANO_LARGURA > 0);

  // Colisão
  if (!morto) {
    if (passaro.y < 0 || passaro.y + 28 > canvas.height) morreu();
    for (let c of canos) {
      if (passaro.x + 28 > c.x && passaro.x < c.x + CANO_LARGURA) {
        if (passaro.y < c.topo || passaro.y + 28 > c.topo + CANO_GAP) { morreu(); break; }
      }
    }
  }

  desenhar();
}

function morreu() {
  if (morto) return;
  morto = true;
  socket.emit('flappy_morreu', { pontos });
  if (jogadoresInfo[myId]) jogadoresInfo[myId].morto = true;
  atualizarPlacar();
}

function desenhar() {
  const W = canvas.width, H = canvas.height;
  // Fundo
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a0a1a');
  grad.addColorStop(1, '#0d0d20');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Estrelas
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  for (let i = 0; i < 30; i++) {
    const sx = (i * 137 + frame * 0.2) % W;
    const sy = (i * 97) % H;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }

  // Canos
  for (let c of canos) {
    // Cano de cima
    const gradCano = ctx.createLinearGradient(c.x, 0, c.x + CANO_LARGURA, 0);
    gradCano.addColorStop(0, '#7c3aed');
    gradCano.addColorStop(1, '#a855f7');
    ctx.fillStyle = gradCano;
    ctx.beginPath();
    ctx.roundRect(c.x, 0, CANO_LARGURA, c.topo, [0, 0, 8, 8]);
    ctx.fill();
    // Cano de baixo
    ctx.beginPath();
    ctx.roundRect(c.x, c.topo + CANO_GAP, CANO_LARGURA, H - c.topo - CANO_GAP, [8, 8, 0, 0]);
    ctx.fill();
    // Brilho
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(c.x + 4, 0, 6, c.topo);
    ctx.fillRect(c.x + 4, c.topo + CANO_GAP, 6, H - c.topo - CANO_GAP);
  }

  // Chão
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, H - 20, W, 20);
  ctx.fillStyle = '#a855f7';
  ctx.fillRect(0, H - 20, W, 2);

  // Pássaro
  desenharPassaro(passaro.x, passaro.y, passaro.vy, morto);

  // Pontos
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px Segoe UI';
  ctx.textAlign = 'center';
  ctx.fillText(pontos, W / 2, 45);
  ctx.font = '14px Segoe UI';
  ctx.fillStyle = '#888';
  ctx.fillText('canos', W / 2, 62);
  ctx.textAlign = 'left';
}

function desenharPassaro(x, y, vy, dead) {
  ctx.save();
  ctx.translate(x + 17, y + 14);
  const rot = Math.min(Math.max(vy * 0.05, -0.4), 0.6);
  ctx.rotate(rot);

  // Corpo
  const g = ctx.createRadialGradient(-2, -2, 2, 0, 0, 16);
  if (dead) { g.addColorStop(0, '#666'); g.addColorStop(1, '#333'); }
  else { g.addColorStop(0, '#ec4899'); g.addColorStop(1, '#a855f7'); }
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(0, 0, 16, 13, 0, 0, Math.PI * 2);
  ctx.fill();

  // Asa
  ctx.fillStyle = dead ? '#555' : '#9333ea';
  ctx.beginPath();
  ctx.ellipse(-4, 2, 10, 5, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Olho
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(7, -3, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = dead ? '#999' : '#1a1a2e';
  ctx.beginPath();
  ctx.arc(8, -3, 3, 0, Math.PI * 2);
  ctx.fill();

  // Bico
  ctx.fillStyle = '#f97316';
  ctx.beginPath();
  ctx.moveTo(13, 0);
  ctx.lineTo(20, -2);
  ctx.lineTo(20, 3);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function atualizarPlacar() {
  const el = document.getElementById('placar');
  el.innerHTML = Object.entries(jogadoresInfo).map(([id, j]) => `
    <div class="placar-item ${j.morto ? 'morto' : ''} ${j.eu ? 'eu' : ''}">
      <div class="pnome">${j.nome.split(' ')[0]}${j.eu ? ' (você)' : ''}</div>
      <div class="ppontos">${j.pontos}</div>
    </div>
  `).join('');
}

socket.on('flappy_update', ({ id, pontos: p }) => {
  if (jogadoresInfo[id]) { jogadoresInfo[id].pontos = p; atualizarPlacar(); }
});

socket.on('flappy_player_morreu', ({ id }) => {
  if (jogadoresInfo[id]) { jogadoresInfo[id].morto = true; atualizarPlacar(); }
});

socket.on('flappy_fim', ({ ranking, premios }) => {
  gameAtivo = false;
  cancelAnimationFrame(animId);
  document.removeEventListener('keydown', pular);

  setTimeout(() => mostrarResultado(ranking, premios), 800);
});

function mostrarResultado(ranking, premios) {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('resultado-screen').style.display = 'block';

  const meuRanking = ranking.findIndex(r => r.id === myId) + 1;
  const meuPremio = premios[myId] || 0;

  const titulo = document.getElementById('resultado-titulo');
  const valorEl = document.getElementById('resultado-valor');

  if (meuPremio > valorAposta) {
    titulo.textContent = '🏆 Você Ganhou!';
    titulo.className = 'resultado-titulo ganhou';
    valorEl.innerHTML = `Você recebeu <span>R$ ${meuPremio.toFixed(2)}</span>`;
  } else if (meuPremio === valorAposta) {
    titulo.textContent = '🔄 Empate!';
    titulo.className = 'resultado-titulo';
    valorEl.innerHTML = `Você recuperou <span>R$ ${meuPremio.toFixed(2)}</span>`;
  } else {
    titulo.textContent = '😢 Você Perdeu';
    titulo.className = 'resultado-titulo perdeu';
    valorEl.innerHTML = `Melhor sorte na próxima vez`;
  }

  const emojis = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
  document.getElementById('ranking-lista').innerHTML = ranking.map((r, i) => `
    <div class="ranking-item">
      <div class="ranking-pos">${emojis[i]}</div>
      <div class="ranking-nome">${r.nome}${r.id === myId ? ' (você)' : ''}</div>
      <div class="ranking-canos">${r.pontos} canos</div>
      <div class="ranking-premio">${premios[r.id] > 0 ? '+R$' + premios[r.id].toFixed(2) : '-'}</div>
    </div>
  `).join('');

  carregarSaldo();
}

function voltarLobby() {
  document.getElementById('resultado-screen').style.display = 'none';
  document.getElementById('lobby').style.display = 'block';
  document.getElementById('btn-entrar').disabled = false;
  document.getElementById('btn-entrar').style.display = 'block';
  document.getElementById('aguardando-box').style.display = 'none';
}

socket.on('flappy_erro', ({ msg }) => {
  mostrarMsg(msg, 'erro');
  sairFila();
});

carregarSaldo();
</script>
</body>
</html>
